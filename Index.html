<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOSI Antonio Ocampo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #050505; color: #ececec; height: 100dvh; display: flex; flex-direction: column; }

        /* Auth Screen */
        .auth-container { max-width: 380px; margin: auto; padding: 30px; background: #0c0c0c; border: 1px solid #1c1c1c; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-container h2 { margin-bottom: 20px; font-weight: 600; color: #fff; }
        .auth-input { width: 100%; height: 45px; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0 15px; color: white; margin-bottom: 12px; outline: none; }
        .auth-input:focus { border-color: #ff2d2d; }
        .auth-btn { width: 100%; height: 45px; background: #ff2d2d; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .auth-btn:hover { background: #e02424; box-shadow: 0 0 15px rgba(255,45,45,0.4); }
        .auth-toggle { font-size: 13px; color: #aaa; margin-top: 15px; cursor: pointer; display: inline-block; }

        /* Header */
        .header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #1c1c1c; background: #0a0a0a; font-weight: 600; }
        .header-left { display: flex; align-items: center; }
        .header-logo { width: 30px; height: 30px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
        .logout-btn { color: #888; text-decoration: none; font-size: 13px; font-weight: normal; transition: 0.2s; }
        .logout-btn:hover { color: #ff2d2d; }

        /* NUEVO: Botón de líneas horizontales para el menú */
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            margin-right: 10px;
            outline: none;
        }
        .menu-btn svg { width: 24px; height: 24px; transition: 0.2s; }
        .menu-btn:hover svg { stroke: #ff2d2d; }

        /* NUEVO: Interfaz Flotante (Modal) para Buscar Personas */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #0d0d0d; border: 1px solid #222; border-radius: 16px; padding: 25px; width: 90%; max-width: 400px; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .close-modal { position: absolute; top: 12px; right: 15px; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; }
        .close-modal:hover { color: #ff2d2d; }
        
        .people-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .people-icon { width: 40px; height: 40px; fill: #1d90f3; }
        .people-title { font-size: 20px; font-weight: bold; color: #fff; }
        
        .search-box-container { display: flex; gap: 10px; margin-top: 15px; }
        .search-input { flex: 1; height: 45px; background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0 15px; color: white; outline: none; font-size: 14px; }
        .search-input:focus { border-color: #1d90f3; }
        .search-go-btn { width: 50px; height: 45px; background: #1d90f3; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .search-go-btn:hover { background: #1573c9; box-shadow: 0 0 15px rgba(29,144,243,0.4); }
        .search-go-btn svg { width: 20px; height: 20px; fill: white; }

        /* Contenedor central Home */
        #home { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .logo-container { width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #000; border: 2px solid rgba(255, 255, 255, 0.4); animation: efectoBrillo 3s infinite ease-in-out; }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        @keyframes efectoBrillo {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 255, 255, 0.3), 0 0 30px rgba(255, 45, 45, 0.2); border-color: rgba(255, 255, 255, 0.3); }
            50% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.7), 0 0 50px rgba(255, 45, 45, 0.5); border-color: rgba(255, 255, 255, 0.8); }
        }

        /* Chat */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { padding: 12px 16px; border-radius: 18px; margin-bottom: 15px; max-width: 85%; font-size: 15px; line-height: 1.5; word-break: break-word; }
        .user { align-self: flex-end; background: #262626; color: white; border-top-right-radius: 4px; }
        .bot { align-self: flex-start; background: #141414; color: #ececec; border: 1px solid #222; border-top-left-radius: 4px; }
        .premium { border: 1px solid #ff2d2d; color: #ffbcbc; font-weight: bold; text-align: center; width: 100%; max-width: 100%; }

        /* Contenedores de Bloques de Código Profesional */
        pre { position: relative; background: #0a0a0a !important; padding: 40px 15px 15px 15px !important; border-radius: 8px; border: 1px solid #222; overflow-x: auto; margin: 12px 0; }
        code { font-family: "Fira Code", Consolas, Monaco, monospace !important; font-size: 14px; }
        
        /* Caja de acciones del código */
        .code-actions { position: absolute; top: 6px; right: 8px; display: flex; gap: 6px; }
        .action-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 4px 8px; font-size: 11px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { background: #ff2d2d; color: white; border-color: #ff2d2d; }

        /* Barra Inferior y Vistas Previas */
        #preview-container { display: none; background: #0a0a0a; border-top: 1px solid #161616; padding: 10px 20px; align-items: center; justify-content: space-between; font-size: 13px; color: #aaa; }
        .preview-content { display: flex; align-items: center; gap: 8px; }
        .close-preview { cursor: pointer; color: #ff2d2d; font-weight: bold; padding: 2px 6px; }

        .footer { padding: 15px 20px; background: #070707; border-top: 1px solid #161616; display: flex; gap: 10px; align-items: center; }
        #mensaje { flex: 1; height: 48px; background: #141414; border: 1px solid #2a2a2a; border-radius: 24px; padding: 0 20px; color: #ffffff; outline: none; font-size: 15px; transition: all 0.3s; }
        #mensaje:focus { border-color: #ff2d2d; box-shadow: 0 0 12px rgba(255, 45, 45, 0.2); }
        
        .btn-clip, .btn-mic { cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; background: #141414; border: 1px solid #2a2a2a; border-radius: 50%; transition: all 0.3s ease; font-size: 18px; color: #aaa; } 
        .btn-clip { overflow: hidden; }
        .img-clip { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .btn-clip:hover, .btn-mic:hover { border-color: #ff2d2d; transform: scale(1.06); color: #ff2d2d; }
        
        .btn-mic.recording { background: #ff2d2d; color: white; animation: pulsoGrabar 1.5s infinite; border-color: white; }
        @keyframes pulsoGrabar { 0% { box-shadow: 0 0 0 0 rgba(255, 45, 45, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 45, 45, 0); } }

        .send-btn { width: 48px; height: 48px; border-radius: 50%; border: none; cursor: pointer; background: #ff2d2d; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 45, 45, 0.4); }
        .send-btn:disabled { background: #444; cursor: not-allowed; box-shadow: none; transform: none; }
    </style>
</head>
<body>

    {% if not logged_in %}
    <div class="auth-container" id="authBox">
        <h2 id="authTitle">Iniciar Sesión</h2>
        <input type="text" id="auth_user" class="auth-input" placeholder="Nombre de usuario">
        <input type="password" id="auth_pass" class="auth-input" placeholder="Contraseña">
        <button class="auth-btn" id="btnAuth" onclick="procesarAuth()">Ingresar</button>
        <span class="auth-toggle" id="toggleAuth" onclick="conmutarAuthMode()">¿No tienes cuenta? Regístrate aquí</span>
    </div>

    <script>
        let modoLogin = true;
        function conmutarAuthMode() {
            modoLogin = !modoLogin;
            document.getElementById("authTitle").innerText = modoLogin ? "Iniciar Sesión" : "Crear Cuenta";
            document.getElementById("btnAuth").innerText = modoLogin ? "Ingresar" : "Registrar y Entrar";
            document.getElementById("toggleAuth").innerText = modoLogin ? "¿No tienes cuenta? Regístrate aquí" : "¿Ya tienes cuenta? Inicia sesión";
        }
        async function procesarAuth() {
            const u = document.getElementById("auth_user").value;
            const p = document.getElementById("auth_pass").value;
            if(!u || !p) return alert("Completa los datos.");
            
            const fd = new FormData();
            fd.append("username", u);
            fd.append("password", p);
            
            const ruta = modoLogin ? "/login" : "/register";
            const res = await fetch(ruta, { method: "POST", body: fd });
            const data = await res.json();
            
            if(data.success) {
                if(!modoLogin) { 
                    modoLogin = true; 
                    await procesarAuth(); 
                } else { 
                    location.reload(); 
                }
            } else {
                alert(data.error);
            }
        }
    </script>
    {% else %}

    <div class="header">
        <div class="header-left">
            <button class="menu-btn" onclick="abrirBuscadorPersonas()" title="Buscar Personas">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ff2d2d" stroke-width="2.5" stroke-linecap="round">
                    <line x1="4" y1="5" x2="20" y2="5" />
                    <line x1="4" y1="11" x2="20" y2="11" />
                    <line x1="4" y1="17" x2="20" y2="17" />
                    <line x1="4" y1="23" x2="20" y2="23" />
                </svg>
            </button>
            <img src="https://i.postimg.cc/XYHn0q10/original-8e5ab17483c1b360c713dd7ac11dccf7-2.jpg" class="header-logo">
            <span>SOSI Asistente</span>
        </div>
        <a href="/logout" class="logout-btn">Cerrar Sesión ({{ username }})</a>
    </div>

    <div class="modal-overlay" id="modalPersonas" onclick="cerrarBuscadorPersonas(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="document.getElementById('modalPersonas').style.display='none'">✕</button>
            <div class="people-header">
                <svg class="people-icon" viewBox="0 0 24 24">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 1.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
                <span class="people-title">Buscar Personas</span>
            </div>
            <div class="search-box-container">
                <input type="text" class="search-input" id="inputBuscarPersona" placeholder="Escribe el nombre aquí...">
                <button class="search-go-btn" onclick="ejecutarBusquedaPersona()">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="home">
        <div class="logo-container">
            <img src="https://i.postimg.cc/XYHn0q10/original-8e5ab17483c1b360c713dd7ac11dccf7-2.jpg">
        </div>
    </div>

    <div id="chat" style="display:none;"></div>

    <div id="preview-container">
        <div class="preview-content" id="preview-content"></div>
        <span class="close-preview" onclick="limpiarAdjuntos()">✕</span>
    </div>

    <div class="footer">
        <label for="fileInput" class="btn-clip" title="Adjuntar archivos">
            <img src="https://i.postimg.cc/RVynYkV7/original-de2cfebf4f22b8bf554b580a8aa19f07-2.jpg" class="img-clip">
        </label>
        <input type="file" id="fileInput" style="display:none" accept="image/*,.pdf,.txt,.py,.js,.html,.css">

        <button type="button" class="btn-mic" id="btnMic" onclick="controlarMicrofono()">🎤</button>
        <input type="text" id="mensaje" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter') enviar()">
        <button class="send-btn" id="btnEnviar" onclick="enviar()">➤</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        let mediaRecorder, audioChunks = [], audioBlob = null, estaGrabando = false;

        // NUEVAS FUNCIONES: Controladores para abrir, cerrar y ejecutar la interfaz flotante
        function abrirBuscadorPersonas() {
            document.getElementById("modalPersonas").style.display = "flex";
            document.getElementById("inputBuscarPersona").focus();
        }

        function cerrarBuscadorPersonas(event) {
            if (event.target.id === "modalPersonas") {
                document.getElementById("modalPersonas").style.display = "none";
            }
        }

        function ejecutarBusquedaPersona() {
            const query = document.getElementById("inputBuscarPersona").value.trim();
            if(query) {
                alert("Buscando a: " + query);
                document.getElementById("modalPersonas").style.display = "none";
                document.getElementById("inputBuscarPersona").value = "";
            }
        }

        document.getElementById("fileInput").addEventListener("change", function() {
            const contenedor = document.getElementById("preview-container");
            const contenido = document.getElementById("preview-content");
            if (this.files && this.files[0]) {
                audioBlob = null;
                const file = this.files[0];
                contenido.innerHTML = file.type.startsWith("image/") 
                    ? `<img src="${URL.createObjectURL(file)}" style="height:30px; border-radius:4px;"> <span>${file.name}</span>`
                    : `📄 <span>Código/Doc: <b>${file.name}</b></span>`;
                contenedor.style.display = "flex";
            }
        });

        async function controlarMicrofono() {
            const btn = document.getElementById("btnMic");
            if (!estaGrabando) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    document.getElementById("preview-content").innerHTML = `🎙️ <span>Nota de voz lista</span>`;
                    document.getElementById("preview-container").style.display = "flex";
                };
                mediaRecorder.start();
                estaGrabando = true; btn.classList.add("recording"); btn.innerHTML = "🛑";
            } else {
                mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t => t.stop());
                estaGrabando = false; btn.classList.remove("recording"); btn.innerHTML = "🎤";
            }
        }

        function limpiarAdjuntos() {
            document.getElementById("fileInput").value = ""; audioBlob = null;
            document.getElementById("preview-container").style.display = "none";
        }

        // Inyección dinámica de botones de Copiar y Voz en cada bloque de código
        function darSoporteMultimediaBloques() {
            document.querySelectorAll("#chat pre").forEach(pre => {
                if (pre.querySelector(".code-actions")) return;
                const contenedorAcciones = document.createElement("div");
                contenedorAcciones.className = "code-actions";

                const btnCopiar = document.createElement("button");
                btnCopiar.className = "action-btn";
                btnCopiar.innerText = "Copiar";
                btnCopiar.onclick = () => {
                    navigator.clipboard.writeText(pre.querySelector("code").innerText);
                    btnCopiar.innerText = "¡Listo!"; setTimeout(() => btnCopiar.innerText = "Copiar", 2000);
                };

                const btnVoz = document.createElement("button");
                btnVoz.className = "action-btn";
                btnVoz.innerText = "🔊 Escuchar";
                btnVoz.onclick = () => {
                    window.speechSynthesis.cancel();
                    const lectura = new SpeechSynthesisUtterance(pre.parentElement.innerText.replace("Copiar", "").replace("🔊 Escuchar", ""));
                    lectura.lang = 'es-ES'; window.speechSynthesis.speak(lectura);
                };

                contenedorAcciones.appendChild(btnVoz);
                contenedorAcciones.appendChild(btnCopiar);
                pre.appendChild(contenedorAcciones);
            });
            // Activar Highlighting de sintaxis en colores
            document.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
        }

        async function enviar() {
            const input = document.getElementById("mensaje");
            const fileInput = document.getElementById("fileInput");
            const btn = document.getElementById("btnEnviar");
            const chat = document.getElementById("chat");
            const texto = input.value.trim();
            const archivo = fileInput.files[0];

            if ((!texto && !archivo && !audioBlob) || btn.disabled) return;

            document.getElementById("home").style.display = "none";
            chat.style.display = "flex";
            btn.disabled = true;

            // Renderizar burbuja del usuario
            if (texto) chat.innerHTML += `<div class="msg user">${texto}</div>`;
            else if (archivo) chat.innerHTML += `<div class="msg user"><i>📄 Archivo adjunto: ${archivo.name}</i></div>`;
            else if (audioBlob) chat.innerHTML += `<div class="msg user"><i>🎙️ Nota de voz enviada</i></div>`;

            const formData = new FormData();
            formData.append("mensaje", texto);
            if (archivo) formData.append("imagen", archivo);
            else if (audioBlob) formData.append("imagen", audioBlob, "audio.mp3");

            input.value = ""; limpiarAdjuntos();
